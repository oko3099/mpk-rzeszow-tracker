<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MPK Rzeszów – Live Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#080b10;color:#e2e8f0;font-family:system-ui,sans-serif}

/* ── HEADER ── */
#hdr{height:46px;background:#0d1117;border-bottom:1px solid #1a2030;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;position:relative;z-index:10}
#logo{font-size:1.1rem;font-weight:900;letter-spacing:3px;color:#f97316}
#logo b{color:#fbbf24}
.sep{width:1px;height:20px;background:#1a2030;flex-shrink:0}
#dot{width:8px;height:8px;border-radius:50%;background:#4b5563;flex-shrink:0;transition:.3s}
#dot.ok{background:#22c55e;animation:bl 2s infinite}
#dot.err{background:#ef4444}
#dot.load{background:#eab308;animation:bl .5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
#ltxt{font-size:.62rem;font-family:monospace;color:#9ca3af;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#btnR{margin-left:auto;border:1px solid #1a2030;background:none;color:#4b5563;font-size:.6rem;font-family:monospace;padding:5px 10px;cursor:pointer;text-transform:uppercase;flex-shrink:0;border-radius:2px}
#btnR:active{border-color:#f97316;color:#f97316}
#btnR:disabled{opacity:.4}

/* ── STATS BAR ── */
#sbar{height:28px;background:#080b10;border-bottom:1px solid #1a2030;display:flex;align-items:center;padding:0 12px;gap:16px;font-size:.6rem;font-family:monospace;color:#4b5563;flex-shrink:0;overflow:hidden;position:relative;z-index:10}
#sbar b{color:#e2e8f0}
.red{color:#ef4444}
#cd{margin-left:auto;color:#4b5563}

/* ── TABS (mobile bottom) ── */
#tabs{height:50px;background:#0d1117;border-top:1px solid #1a2030;display:flex;flex-shrink:0;position:relative;z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:#4b5563;font-size:.55rem;font-family:monospace;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;padding:0;border-top:2px solid transparent}
.tab.on{color:#f97316;border-top-color:#f97316}
.tab-ico{font-size:1.2rem;line-height:1}

/* ── POWRÓT NA MAPĘ (mobile, widoczny w liście) ── */
#back-to-map{
  display:none;
  width:100%;padding:8px 12px;
  background:#0d1117;border-bottom:1px solid #f97316;
  font-size:.7rem;font-family:monospace;color:#f97316;
  cursor:pointer;text-align:center;letter-spacing:.5px;
  flex-shrink:0;
}
#back-to-map.visible{display:block}

/* ── DESKTOP LAYOUT ── */
@media(min-width:641px){
  body{display:flex;flex-direction:column}
  #tabs{display:none}
  #desktop-main{display:flex;flex:1;min-height:0}
  #panel-list{
    width:300px;min-width:300px;flex-shrink:0;
    display:flex!important;flex-direction:column;
    background:#0d1117;border-right:1px solid #1a2030;
    visibility:visible!important;pointer-events:auto!important;
    position:static!important;height:auto!important;
  }
  #panel-map{
    flex:1;position:relative!important;display:block!important;visibility:visible!important;
    top:auto!important;left:auto!important;right:auto!important;bottom:auto!important;
    visibility:visible!important;pointer-events:auto!important;
    height:auto!important;
  }
  #leg{display:block}
  #back-to-map{display:none!important}
  #toast{bottom:16px}
}

/* ── MOBILE LAYOUT ── */
@media(max-width:640px){
  #desktop-main{display:contents}
  #panel-map,#panel-list{
    position:fixed;
    top:74px; /* hdr+sbar */
    left:0;right:0;bottom:50px; /* tabs */
    visibility:hidden;pointer-events:none;z-index:1;
  }
  #panel-map.on,#panel-list.on{
    visibility:visible;pointer-events:auto;z-index:2;
  }
  #panel-map.on{position:fixed;top:74px;left:0;right:0;bottom:50px}
  #panel-map{display:block}
  #panel-list{display:flex;flex-direction:column;background:#0d1117;overflow:hidden}
  #leg{display:none}
  #toast{bottom:58px}
}

/* ── MAP ── */
#map{width:100%;height:100%}

/* ── LEGENDA ── */
#leg{
  display:none;
  position:absolute;bottom:20px;right:12px;
  background:rgba(8,11,16,.95);border:1px solid #2a3040;
  padding:10px 15px;z-index:700;
  font-size:.68rem;font-family:monospace;line-height:2.2;
  pointer-events:none;border-radius:4px;
  box-shadow:0 2px 12px rgba(0,0,0,.7);
}
.li{display:flex;align-items:center;gap:9px;white-space:nowrap}
.ld{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* ── FILTERS / LIST ── */
#filters{padding:8px;border-bottom:1px solid #1a2030;flex-shrink:0}
#filters input{
  width:100%;display:block;margin-bottom:6px;
  background:#080b10;border:1px solid #1a2030;
  color:#e2e8f0;font-size:.8rem;font-family:monospace;
  padding:8px 10px;outline:none;border-radius:2px;-webkit-appearance:none;
}
#filters input:focus{border-color:#f97316}
#filters input::placeholder{color:#4b5563}
#sorts{display:flex;gap:3px;margin-bottom:6px}
.sb{flex:1;background:none;border:1px solid #1a2030;color:#4b5563;font-size:.6rem;font-family:monospace;padding:6px 2px;cursor:pointer;text-transform:uppercase;border-radius:2px}
.sb.on{border-color:#f97316;color:#f97316;background:rgba(249,115,22,.07)}
#cnt{font-size:.6rem;font-family:monospace;color:#4b5563}
#cnt b{color:#fbbf24}
#vlist{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch}

/* ── VEHICLE CARDS ── */
.vc{border:1px solid #1a2030;border-left:3px solid #2a3040;background:#080b10;padding:10px 11px;margin-bottom:6px;cursor:pointer;border-radius:2px}
.vc:active{background:#111820}
.vc.sel{border-color:#fbbf24;background:#0d1000}
.vc.late{border-left-color:#ef4444}
.vc.minor{border-left-color:#eab308}
.vc.ok{border-left-color:#22c55e}
.vc.early{border-left-color:#60a5fa}
.vc.terminus{border-left-color:#a855f7;background:#0d0a14}

.vr1{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.vline{font-weight:900;font-family:monospace;font-size:1.15rem;background:#f97316;color:#fff;min-width:42px;text-align:center;padding:2px 6px;flex-shrink:0;line-height:1.4;border-radius:2px}
.vc.late .vline{background:#ef4444}
.vc.ok .vline{background:#16a34a}
.vc.minor .vline{background:#eab308;color:#000}
.vc.early .vline{background:#3b82f6}
.vc.terminus .vline{background:#a855f7}
.vhead{font-size:.82rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vhead.dim{color:#4b5563;font-style:italic;font-weight:400}
.dtag{font-size:.6rem;font-family:monospace;font-weight:700;padding:2px 6px;flex-shrink:0;white-space:nowrap;border-radius:2px}
.dtag.late{color:#ef4444;background:rgba(239,68,68,.12)}
.dtag.ok{color:#22c55e;background:rgba(34,197,94,.1)}
.dtag.minor{color:#eab308;background:rgba(234,179,8,.1)}
.dtag.early{color:#60a5fa;background:rgba(96,165,250,.1)}
.ptag{font-size:.58rem;font-family:monospace;font-weight:700;padding:2px 7px;background:rgba(168,85,247,.15);color:#a855f7;flex-shrink:0;border:1px solid rgba(168,85,247,.3);border-radius:2px}

.vr2{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.vtabor{font-size:.7rem;font-family:monospace;color:#9ca3af;font-weight:600}
.vmodel{font-size:.67rem;color:#6b7280;font-style:italic}
.vbrig{font-size:.63rem;font-family:monospace;color:#3b82f6;background:rgba(59,130,246,.1);padding:1px 6px;border-radius:2px;margin-left:auto}
.vr3{font-size:.63rem;font-family:monospace;color:#4b5563;display:flex;gap:10px}
.vr3 .red{color:#ef4444}

#emsg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;font-size:.75rem;font-family:monospace;color:#4b5563;text-align:center;padding:20px;line-height:1.7}
#emsg .ico{font-size:2.5rem;opacity:.3}

/* ── LEAFLET ── */
.leaflet-tile{filter:brightness(.42) saturate(.5) hue-rotate(15deg)}
.leaflet-control-zoom{margin:12px!important}
.leaflet-control-zoom a{background:#0d1117!important;border-color:#1a2030!important;color:#9ca3af!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:18px!important}
.leaflet-control-attribution{background:rgba(8,11,16,.85)!important;color:#4b5563!important;font-size:.45rem!important}
.leaflet-popup-content-wrapper{background:#0d1117!important;border:1px solid #1a2030!important;border-radius:4px!important;color:#e2e8f0!important;box-shadow:0 4px 24px rgba(0,0,0,.95)!important}
.leaflet-popup-tip{background:#0d1117!important}
.leaflet-popup-content{margin:12px 14px!important;min-width:210px}
.leaflet-popup-close-button{color:#6b7280!important;font-size:20px!important;padding:5px 8px!important}

/* ── MARKERS ── */
.bm{width:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:5px;background:#f97316;border:2px solid rgba(255,255,255,.95);box-shadow:0 2px 14px rgba(0,0,0,.85);position:relative;cursor:pointer;padding:3px 5px;gap:1px}
.bm.late{background:#ef4444}.bm.ok{background:#16a34a}.bm.minor{background:#eab308}.bm.early{background:#3b82f6}.bm.terminus{background:#a855f7}
.bm-line{font-size:1.25rem;font-weight:900;color:#fff;font-family:monospace;line-height:1.1;white-space:nowrap}
.bm.minor .bm-line{color:#000}
.bm-head{font-size:.6rem;color:rgba(255,255,255,.95);font-family:monospace;line-height:1.2;white-space:nowrap;overflow:hidden;max-width:68px;text-align:center;text-overflow:ellipsis}
.bm.minor .bm-head{color:rgba(0,0,0,.8)}
.bm-brig{font-size:.6rem;color:rgba(255,255,255,.85);font-family:monospace;line-height:1.2;white-space:nowrap;overflow:hidden;max-width:68px;text-align:center}
.bm.minor .bm-brig{color:rgba(0,0,0,.7)}
.bm-delay{font-size:.65rem;font-weight:700;font-family:monospace;line-height:1.1;white-space:nowrap}
.bm-delay.late{color:#ffd0d0}
.bm-delay.early{color:#c8f0ff}
.bm.minor .bm-delay.late{color:#7a0000}
.bm.minor .bm-delay.early{color:#00407a}
.bm-p{font-size:.55rem;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.bm-arrow{font-size:.85rem;line-height:1;transform-origin:center}
.bm::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top:7px solid #f97316}
.bm.late::after{border-top-color:#ef4444}.bm.ok::after{border-top-color:#16a34a}.bm.minor::after{border-top-color:#eab308}.bm.early::after{border-top-color:#3b82f6}.bm.terminus::after{border-top-color:#a855f7}

/* ── POPUP ── */
.pop-line{font-size:1.8rem;font-weight:900;color:#f97316;font-family:monospace;line-height:1}
.pop-line.terminus{color:#a855f7}
.pop-head{font-size:.8rem;font-weight:700;margin:2px 0 1px}
.pop-model{font-size:.65rem;color:#6b7280;margin-bottom:6px;font-style:italic}
.pop-terminus{font-size:.6rem;font-family:monospace;font-weight:700;color:#a855f7;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);padding:2px 8px;display:inline-block;margin-bottom:6px;border-radius:2px}
.ptbl{font-size:.65rem;font-family:monospace;border-collapse:collapse;width:100%}
.ptbl td{padding:3px 0}
.ptbl td:first-child{color:#6b7280;padding-right:10px;white-space:nowrap}
.ptbl td:last-child{color:#e2e8f0;font-weight:600}
.cl{color:#ef4444!important}.cm{color:#eab308!important}.co{color:#22c55e!important}.ce{color:#60a5fa!important}
.pop-btn{display:inline-block;margin-top:9px;font-size:.64rem;font-family:monospace;color:#f97316;border:1px solid #f97316;padding:5px 14px;cursor:pointer;border-radius:2px}

/* ── TOAST ── */
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(80px);opacity:0;transition:.2s;background:#0d1117;border:1px solid #1a2030;border-top:2px solid #f97316;padding:8px 18px;font-size:.67rem;font-family:monospace;color:#e2e8f0;z-index:9999;pointer-events:none;max-width:88vw;text-align:center;border-radius:2px}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

</style>
</head>
<body>

<div id="hdr">
  <div id="logo">MPK<b>.</b>RZ</div>
  <div class="sep"></div>
  <div id="dot"></div>
  <span id="ltxt">Inicjalizacja...</span>
  <button id="btnR" onclick="doRefresh()">↺ Odśwież</button>
</div>

<div id="sbar">
  <span>🚌 <b id="sc">—</b></span>
  <span>⏰ <b id="sl">—</b> opóźn.</span>
  <span>🟣 <b id="sp" class="red">—</b> pętla</span>
  <span style="display:flex;gap:14px;align-items:center">
    <span>GTFS: <b id="sg">—</b></span>
  </span>
  <span id="cd"></span>
</div>

<div id="desktop-main">

  <div id="panel-list">
    <!-- przycisk powrotu na mapę (tylko mobile, gdy ktoś kliknął "pokaż w liście") -->
    <div id="back-to-map" onclick="backToMap()">← Wróć na mapę</div>
    <div id="filters">
      <input id="fl" placeholder="🔍 Linia (np. 17, 34)..." oninput="renderList()">
      <input id="fh" placeholder="🔍 Kierunek..."           oninput="renderList()">
      <input id="fm" placeholder="🔍 Model (np. Solaris)..." oninput="renderList()">
      <input id="ft" placeholder="🔍 Numer taborowy..."     oninput="renderList()">
      <div id="sorts">
        <button class="sb on" data-s="delay" onclick="setSort(this)">Opóźn.</button>
        <button class="sb"    data-s="line"  onclick="setSort(this)">Linia</button>
        <button class="sb"    data-s="tabor" onclick="setSort(this)">Tabor</button>
      </div>
      <div id="cnt">Brak danych</div>
    </div>
    <div id="vlist"><div id="emsg"><div class="ico">🚌</div>Ładowanie...</div></div>
  </div>

  <div id="panel-map">
    <div id="map"></div>
    <div id="leg">
      <div class="li"><div class="ld" style="background:#16a34a"></div>Na czasie</div>
      <div class="li"><div class="ld" style="background:#eab308"></div>&lt;3 min opóźn.</div>
      <div class="li"><div class="ld" style="background:#ef4444"></div>&gt;3 min opóźn.</div>
      <div class="li"><div class="ld" style="background:#f97316"></div>Brak danych RT</div>
      <div class="li"><div class="ld" style="background:#a855f7"></div>Na pętli</div>
    </div>
  </div>

</div>

<div id="tabs">
  <button class="tab on" id="tab-map"  onclick="showTab('map')"><div class="tab-ico">🗺️</div><div>Mapa</div></button>
  <button class="tab"    id="tab-list" onclick="showTab('list')"><div class="tab-ico">📋</div><div>Lista</div></button>
  <button class="tab"    id="tab-srch" onclick="showTab('srch')"><div class="tab-ico">🔍</div><div>Szukaj</div></button>
</div>

<div id="toast"></div>

<script>
'use strict';
var vehicles=[], markers={}, sel=null, sortBy='delay', cdTimer, map;
var cameFromMap = false; // czy lista została otwarta przez "pokaż w liście"

// ── TABS ──────────────────────────────────────────────────────────
var activeTab='map';
function showTab(t, fromMap) {
  activeTab=t;
  document.getElementById('panel-map').classList.toggle('on', t==='map');
  document.getElementById('panel-list').classList.toggle('on', t==='list'||t==='srch');
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var tabEl = document.getElementById('tab-'+(t==='srch'?'srch':t==='list'?'list':'map'));
  if(tabEl) tabEl.classList.add('on');
  if(t==='map'){ setTimeout(function(){if(map)map.invalidateSize();},50); setTimeout(function(){if(map)map.invalidateSize();},300); }
  if(t==='srch'){ setTimeout(function(){document.getElementById('fl').focus();},150); }
  // Pokaż/ukryj przycisk powrotu
  cameFromMap = !!fromMap;
  var btn = document.getElementById('back-to-map');
  if(btn) btn.classList.toggle('visible', cameFromMap && window.innerWidth<=640);
}

function backToMap(){
  cameFromMap=false;
  document.getElementById('back-to-map').classList.remove('visible');
  showTab('map');
  if(sel && markers[sel]) markers[sel].openPopup();
}

// ── HELPERS ───────────────────────────────────────────────────────
function dc(v){if(v.atTerminus)return 'terminus';var d=v.delay;if(d==null)return '';if(d>180)return 'late';if(d>30)return 'minor';if(d<-30)return 'early';return 'ok';}

function dl(d){
  if(d==null)return '—';
  if(Math.abs(d)<=30)return 'Na czasie';
  var ad=Math.abs(d);
  var h=Math.floor(ad/3600); var m=Math.floor((ad%3600)/60); var s=ad%60;
  var parts=[];
  if(h>0)parts.push(h+'h');
  if(m>0||h>0)parts.push(m+'min');
  parts.push(s+'s');
  var str=parts.join(' ');
  // d > 0 = spóźnienie, d < 0 = przed czasem
  return d>0 ? 'Spóźn. -'+str : 'Przed cz. +'+str;
}

function dlShort(d){
  if(d==null||Math.abs(d)<=30)return null;
  var ad=Math.abs(d);
  var h=Math.floor(ad/3600); var m=Math.floor((ad%3600)/60); var s=ad%60;
  var str='';
  if(h>0) str=h+'h'+m+'m';
  else if(m>0) str=m+'m'+s+'s';
  else str=s+'s';
  // d > 0 spóźnienie = czerwony plus, d < 0 przed czasem = niebieski minus
  return (d>0?'-':'+')+str;
}

function ds(v){if(v.atTerminus)return -99999;return v.delay==null?-9999:v.delay;}

function bearingArrow(b){
  // Strzałka obracana CSS transform
  return '<div class="bm-arrow" style="transform:rotate('+b+'deg)">↑</div>';
}

function setDot(s,t){document.getElementById('dot').className=s;document.getElementById('ltxt').textContent=t;}
var _tt;
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('show');},3000);}

function countdown(){
  clearInterval(cdTimer);var n=15,el=document.getElementById('cd');
  cdTimer=setInterval(function(){n--;el.textContent='↺ '+n+'s';if(n<=0){clearInterval(cdTimer);doRefresh();}},1000);
}

// ── FETCH ─────────────────────────────────────────────────────────
function doRefresh(){
  var btn=document.getElementById('btnR');btn.disabled=true;setDot('load','Pobieranie...');
  var ctrl=new AbortController(),tid=setTimeout(function(){ctrl.abort();},12000);
  fetch('/api/vehicles',{signal:ctrl.signal})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      if(data.error)throw new Error(data.error);
      vehicles=data.vehicles||[];
      var late=vehicles.filter(function(v){return v.delay>180&&!v.atTerminus;}).length;
      var term=data.atTerminus||0;
      document.getElementById('sc').textContent=vehicles.length;
      document.getElementById('sl').textContent=late;
      document.getElementById('sp').textContent=term;
      document.getElementById('sg').textContent=data.gtfsLoaded?(data.tripsInDb+' kursów'):'brak';
      setDot(vehicles.length>0?'ok':'err',vehicles.length>0?'Live · '+vehicles.length+' pojazdów':'Brak pojazdów');
      if(vehicles.length>0) toast('✓ '+vehicles.length+' autobusów');
      renderList();renderMarkers();countdown();
    })
    .catch(function(e){
      clearTimeout(tid);setDot('err',e.name==='AbortError'?'Timeout':'Błąd');
      toast('❌ '+(e.name==='AbortError'?'Timeout':e.message));countdown();
    })
    .finally(function(){btn.disabled=false;});
}

// ── LIST ──────────────────────────────────────────────────────────
function renderList(){
  var fl=document.getElementById('fl').value.trim().toLowerCase();
  var fh=document.getElementById('fh').value.trim().toLowerCase();
  var fm=document.getElementById('fm').value.trim().toLowerCase();
  var ft=document.getElementById('ft').value.trim().toLowerCase();
  var list=vehicles.filter(function(v){
    if(fl&&!(v.lineNr||v.routeId||'').toLowerCase().includes(fl))return false;
    if(fh&&!(v.headsign||'').toLowerCase().includes(fh))return false;
    if(fm&&!((v.brand||'')+' '+(v.model||'')).toLowerCase().includes(fm))return false;
    if(ft&&!(v.vehicleLabel||'').toLowerCase().includes(ft))return false;
    return true;
  });
  if(sortBy==='delay')list.sort(function(a,b){return ds(b)-ds(a);});
  if(sortBy==='line') list.sort(function(a,b){return (a.lineNr||'').localeCompare(b.lineNr||'');});
  if(sortBy==='tabor')list.sort(function(a,b){return (a.vehicleLabel||'').localeCompare(b.vehicleLabel||'');});
  document.getElementById('cnt').innerHTML='Widoczne: <b>'+list.length+'</b> / '+vehicles.length;
  if(!list.length){
    document.getElementById('vlist').innerHTML='<div id="emsg"><div class="ico">'+(vehicles.length===0?'⏳':'🔍')+'</div>'+(vehicles.length===0?'Ładowanie...':'Brak wyników')+'</div>';
    return;
  }
  document.getElementById('vlist').innerHTML=list.map(function(v){
    var cls=dc(v),lineTxt=v.lineNr||v.routeId||'?',headTxt=v.headsign||'';
    var modelTxt=((v.brand?v.brand+' ':'')+v.model).trim();
    var issel=v.id===sel;
    return '<div class="vc '+cls+(issel?' sel':'')+'" onclick="selectV(\''+v.id+'\')">'+
      '<div class="vr1">'+
        '<div class="vline">'+lineTxt+'</div>'+
        '<div class="vhead'+(headTxt?'':' dim')+'">'+(headTxt||'Brak danych GTFS')+'</div>'+
        (v.atTerminus?'<span class="ptag">PĘTLA</span>':'')+(cls&&cls!=='terminus'?'<span class="dtag '+cls+'">'+dl(v.delay)+'</span>':'')+
      '</div>'+
      '<div class="vr2">'+
        '<span class="vtabor">Tabor '+v.vehicleLabel+'</span>'+
        (modelTxt?'<span class="vmodel">'+modelTxt+'</span>':'')+
        (v.brigade?'<span class="vbrig">Bryg. '+v.brigade+'</span>':'')+
      '</div>'+
      (v.statusLabel?'<div class="vr3"><span class="'+(v.atTerminus?'red':'')+'">'+v.statusLabel+'</span></div>':'')+
    '</div>';
  }).join('');
}

// ── MARKERS ───────────────────────────────────────────────────────
function renderMarkers(){
  if(!map)return;
  var ids={};vehicles.forEach(function(v){ids[v.id]=true;});
  Object.keys(markers).forEach(function(id){if(!ids[id]){markers[id].remove();delete markers[id];}});
  vehicles.forEach(function(v){
    if(!v.lat||!v.lon)return;
    var cls=dc(v),lineTxt=v.lineNr||v.routeId||'?';
    var dShort=dlShort(v.delay);
    // Marker: linia + brygada + opóźnienie + strzałka kierunku
    // Skróć headsign do ~10 znaków na marker
    var hShort=v.headsign?(v.headsign.length>15?v.headsign.substring(0,14)+'…':v.headsign):'';
    var mob=window.innerWidth<=640;
    // Mobile: małe markery, desktop: duże
    var mW  = mob ? 38  : 72;
    var mFS = mob ? 11  : 20;   // font-size linia px
    var mFS2= mob ? 7   : 10;   // font-size reszta px
    var mH  = mob ? (v.atTerminus?44:(hShort?42:32)) : (v.atTerminus?82:(hShort?82:66));
    var mPad= mob ? '1px 2px' : '3px 5px';
    var mMW = mob ? 34  : 68;   // max-width tekstu
    var mArr= mob ? 10  : 14;   // strzałka px

    var bStyle='width:'+mW+'px;height:'+mH+'px;padding:'+mPad+';gap:0px;';
    var lineStyle='font-size:'+mFS+'px;font-weight:900;color:#fff;font-family:monospace;line-height:1.1;white-space:nowrap;'+(cls==='minor'?'color:#000;':'');
    var subStyle='font-size:'+mFS2+'px;font-family:monospace;line-height:1.2;overflow:hidden;max-width:'+mMW+'px;text-align:center;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,.9);'+(cls==='minor'?'color:rgba(0,0,0,.75);':'');
    var delayColor=v.delay>0?'#ffd0d0':'#c8f0ff';
    if(cls==='minor') delayColor=v.delay>0?'#7a0000':'#00407a';

    var markerHtml=
      '<div class="bm '+cls+'" style="'+bStyle+'">'+
        (v.bearing?'<div style="font-size:'+mArr+'px;line-height:1;transform:rotate('+v.bearing+'deg);transform-origin:center">↑</div>':'')+
        '<div style="'+lineStyle+'">'+lineTxt+'</div>'+
        (hShort?'<div style="'+subStyle+'">'+hShort+'</div>':'')+
        (v.brigade?'<div style="'+subStyle+'">'+v.brigade+'</div>':'')+
        (dShort?'<div style="'+subStyle+'font-weight:700;color:'+delayColor+';">'+dShort+'</div>':'')+
        (v.atTerminus?'<div style="font-size:'+(mob?6:9)+'px;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:.5px;font-weight:700;">pętla</div>':'')+
      '</div>';
    var icon=L.divIcon({
      className:'',
      html:markerHtml,
      iconSize:[mW,mH],
      iconAnchor:[mW/2,mH],
      popupAnchor:[0,-(mH+4)]
    });
    var cc={late:'cl',minor:'cm',ok:'co',early:'ce'}[cls]||'';
    var modelTxt=((v.brand?v.brand+' ':'')+v.model).trim()||'Nieznany model';
    var popup=
      '<div class="pop-line'+(v.atTerminus?' terminus':'')+'">'+lineTxt+'</div>'+
      '<div class="pop-head">'+(v.headsign||'Brak kierunku')+'</div>'+
      (v.atTerminus?'<div class="pop-terminus">⬛ NA PĘTLI</div>':'')+
      '<div class="pop-model">'+modelTxt+'</div>'+
      '<table class="ptbl">'+
      '<tr><td>Tabor</td><td>'+v.vehicleLabel+'</td></tr>'+
      (v.brand?'<tr><td>Producent</td><td>'+v.brand+'</td></tr>':'')+
      (v.model?'<tr><td>Model</td><td>'+v.model+'</td></tr>':'')+
      '<tr><td>Brygada</td><td>'+(v.brigade||'—')+'</td></tr>'+
      '<tr><td>Kierunek</td><td>'+(v.bearing?v.bearing+'°':'—')+'</td></tr>'+
      '<tr><td>Status</td><td>'+(v.statusLabel||'—')+'</td></tr>'+
      '<tr><td>Opóźnienie</td><td class="'+cc+'">'+dl(v.delay)+'</td></tr>'+
      (v.occupancy?'<tr><td>Zapełnienie</td><td>'+v.occupancy+'</td></tr>':'')+
      '</table>'+
      '<div class="pop-btn" onclick="goToList(\''+v.id+'\')">📋 Pokaż w liście</div>';
    if(markers[v.id]){
      markers[v.id].setLatLng([v.lat,v.lon]).setIcon(icon);
      if(markers[v.id].getPopup())markers[v.id].getPopup().setContent(popup);
    }else{
      var m=L.marker([v.lat,v.lon],{icon:icon}).bindPopup(popup,{maxWidth:260}).addTo(map);
      m.on('click',(function(id){return function(){sel=id;renderList();};})(v.id));
      markers[v.id]=m;
    }
  });
}

// ── NAWIGACJA ─────────────────────────────────────────────────────
function goToList(id){
  map.closePopup();
  sel=id;
  showTab('list', true); // true = przyszedł z mapy
  renderList();
  setTimeout(function(){var c=document.querySelector('.vc.sel');if(c)c.scrollIntoView({behavior:'smooth',block:'center'});},200);
}

function selectV(id){
  sel=id;
  var v=vehicles.find(function(x){return x.id===id;});
  if(v&&v.lat&&map){
    cameFromMap=false;
    document.getElementById('back-to-map').classList.remove('visible');
    showTab('map');
    setTimeout(function(){map.flyTo([v.lat,v.lon],16,{duration:0.5});if(markers[id])markers[id].openPopup();},50);
  }
  renderList();
}

function setSort(btn){sortBy=btn.dataset.s;document.querySelectorAll('.sb').forEach(function(b){b.classList.toggle('on',b===btn);});renderList();}

// ── INIT ──────────────────────────────────────────────────────────
map=L.map('map',{zoomControl:true}).setView([50.0413,21.999],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
}).addTo(map);
showTab('map');
setTimeout(function(){if(map)map.invalidateSize();},100);
setTimeout(function(){if(map)map.invalidateSize();},400);
setTimeout(function(){if(map)map.invalidateSize();},800);
doRefresh();
</script>
